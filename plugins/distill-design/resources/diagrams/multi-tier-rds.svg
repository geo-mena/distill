<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Typical Multi-Tier Architecture with RDS (Multi-AZ + Read Replica)</title>
  <desc>An AWS multi-tier architecture in Distill style. Four bands. EDGE: Users → Route 53. APPLICATION LAYER (VPC): Application Load Balancer in a public subnet, two EC2 application servers in private subnets. DATABASE LAYER (RDS): a DB Subnet Group with the Primary in sa-east-1a and a Multi-AZ Standby in sa-east-1b (synchronous replication), plus an asynchronously-replicated Read Replica in sa-east-1c. BACKUPS &amp; MONITORING: RDS Automated Backups (7-day retention) and S3 Manual Snapshots, with CloudWatch collecting metrics and logs from the database tier. Solid arrows for primary read/write paths; dashed for replication, snapshots, and observability.</desc>
  <style>
    text {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", Arial, sans-serif;
      text-rendering: geometricPrecision;
    }
    .eyebrow      { font-size: 11px; font-weight: 500; letter-spacing: 1.1px; fill: #6a6a6a; }
    .sub-eyebrow  { font-size: 10px; font-weight: 500; letter-spacing: 1px; fill: #6a6a6a; }
    .block        { font-size: 13px; font-weight: 500; fill: #2a2a2a; }
    .block-sub    { font-size: 10px; fill: #6a6a6a; }
    .edge-label   { font-size: 10px; fill: #6a6a6a; font-style: italic; }
  </style>

  <defs>
    <symbol id="service-users" viewBox="0 0 24 24">
      <circle cx="9" cy="8" r="3" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M3.5 19 C 3.5 14.5 6 13.5 9 13.5 C 12 13.5 14.5 14.5 14.5 19" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="16" cy="9" r="2.3" fill="none" stroke="#666" stroke-width="1.2"/>
      <path d="M14 18 C 14 15 16 14 17.8 14 C 19.6 14 21.5 15 21.5 18" fill="none" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
    </symbol>
    <symbol id="service-dns" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.5" fill="none" stroke="#666" stroke-width="1.5"/>
      <ellipse cx="12" cy="12" rx="8.5" ry="3.5" fill="none" stroke="#666" stroke-width="1"/>
      <line x1="12" y1="3.5" x2="12" y2="20.5" stroke="#666" stroke-width="1"/>
      <line x1="3.5" y1="12" x2="20.5" y2="12" stroke="#666" stroke-width="1"/>
    </symbol>
    <symbol id="service-load-balancer" viewBox="0 0 24 24">
      <line x1="6" y1="3" x2="6" y2="21" stroke="#666" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="6" x2="18" y2="6" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="12" x2="18" y2="12" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="18" x2="18" y2="18" stroke="#666" stroke-width="1.4" stroke-linecap="round"/>
      <polygon points="18,4 21,6 18,8" fill="#666"/>
      <polygon points="18,10 21,12 18,14" fill="#666"/>
      <polygon points="18,16 21,18 18,20" fill="#666"/>
    </symbol>
    <symbol id="service-compute" viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="#666" stroke-width="1.5"/>
      <line x1="4" y1="9" x2="20" y2="9" stroke="#666" stroke-width="1"/>
      <line x1="4" y1="14" x2="20" y2="14" stroke="#666" stroke-width="1"/>
      <circle cx="7" cy="6.5" r="0.6" fill="#666"/>
      <circle cx="7" cy="11.5" r="0.6" fill="#666"/>
      <circle cx="7" cy="16.5" r="0.6" fill="#666"/>
    </symbol>
    <symbol id="service-database" viewBox="0 0 24 24">
      <ellipse cx="12" cy="6" rx="7" ry="2.5" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M5 6 V 18 C 5 19.4 8 20.5 12 20.5 C 16 20.5 19 19.4 19 18 V 6" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M5 11 C 5 12.4 8 13.5 12 13.5 C 16 13.5 19 12.4 19 11" fill="none" stroke="#666" stroke-width="1"/>
      <path d="M5 14.5 C 5 15.9 8 17 12 17 C 16 17 19 15.9 19 14.5" fill="none" stroke="#666" stroke-width="1"/>
    </symbol>
    <symbol id="service-object-storage" viewBox="0 0 24 24">
      <path d="M5 7 L 7 20 C 7 20.6 8.5 21 12 21 C 15.5 21 17 20.6 17 20 L 19 7 Z" fill="none" stroke="#666" stroke-width="1.5" stroke-linejoin="round"/>
      <ellipse cx="12" cy="7" rx="7" ry="1.8" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M8 4 C 8 2.8 9.5 2.5 12 2.5 C 14.5 2.5 16 2.8 16 4" fill="none" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M6.5 13 C 8.5 13.6 11 14 12 14 C 13 14 15.5 13.6 17.5 13" fill="none" stroke="#666" stroke-width="1"/>
    </symbol>
    <symbol id="service-block-storage" viewBox="0 0 24 24">
      <ellipse cx="12" cy="6" rx="7" ry="2.2" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M5 6 V 9 C 5 10.2 8 11.2 12 11.2 C 16 11.2 19 10.2 19 9 V 6" fill="none" stroke="#666" stroke-width="1.5"/>
      <ellipse cx="12" cy="12" rx="7" ry="2.2" fill="none" stroke="#666" stroke-width="1.5"/>
      <path d="M5 12 V 15 C 5 16.2 8 17.2 12 17.2 C 16 17.2 19 16.2 19 15 V 12" fill="none" stroke="#666" stroke-width="1.5"/>
      <ellipse cx="12" cy="18" rx="7" ry="2.2" fill="none" stroke="#666" stroke-width="1.5"/>
    </symbol>
    <symbol id="service-metrics" viewBox="0 0 24 24">
      <line x1="3" y1="20" x2="21" y2="20" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="5" y="14" width="3.5" height="6" fill="none" stroke="#666" stroke-width="1.2"/>
      <rect x="10.25" y="9" width="3.5" height="11" fill="none" stroke="#666" stroke-width="1.2"/>
      <rect x="15.5" y="5" width="3.5" height="15" fill="none" stroke="#666" stroke-width="1.2"/>
    </symbol>
  </defs>

  <!-- ============================================================ -->
  <!-- BAND 1 — EDGE                                                  -->
  <!-- ============================================================ -->
  <text x="80" y="50" class="eyebrow">EDGE — INGRESS</text>

  <rect x="380" y="80" width="160" height="56" rx="4" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1"/>
  <use href="#service-users" x="392" y="92" width="22" height="22"/>
  <text x="476" y="103" class="block" text-anchor="middle">Users</text>
  <text x="476" y="121" class="block-sub" text-anchor="middle">internet</text>

  <rect x="660" y="80" width="160" height="56" rx="4" fill="#d6e4f3" stroke="#356aa8" stroke-width="1.2"/>
  <use href="#service-dns" x="672" y="92" width="22" height="22"/>
  <text x="754" y="103" class="block" text-anchor="middle">Route 53</text>
  <text x="754" y="121" class="block-sub" text-anchor="middle">DNS</text>

  <line x1="540" y1="108" x2="654" y2="108" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="654,104 660,108 654,112" fill="#666"/>

  <!-- ============================================================ -->
  <!-- BAND 2 — APPLICATION LAYER (VPC)                                -->
  <!-- ============================================================ -->
  <text x="80" y="200" class="eyebrow">APPLICATION LAYER — VPC</text>

  <rect x="160" y="220" width="880" height="270" rx="6" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1"/>
  <text x="180" y="244" class="sub-eyebrow">VPC</text>

  <!-- Public subnet -->
  <rect x="200" y="260" width="800" height="74" rx="4" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="220" y="278" class="sub-eyebrow">PUBLIC SUBNET</text>

  <rect x="440" y="282" width="320" height="44" rx="4" fill="#d6e4f3" stroke="#356aa8" stroke-width="1.2"/>
  <use href="#service-load-balancer" x="448" y="294" width="20" height="20"/>
  <text x="608" y="304" class="block" text-anchor="middle" dominant-baseline="middle">Application Load Balancer</text>

  <!-- Route 53 → ALB -->
  <path d="M 740 136 V 200 H 600 V 282" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="596,278 604,278 600,286" fill="#666"/>

  <!-- Private subnets -->
  <rect x="200" y="354" width="800" height="120" rx="4" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="220" y="372" class="sub-eyebrow">PRIVATE SUBNETS</text>

  <rect x="280" y="384" width="220" height="76" rx="4" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-compute" x="292" y="400" width="22" height="22"/>
  <text x="390" y="412" class="block" text-anchor="middle">EC2 Instance A</text>
  <text x="390" y="430" class="block-sub" text-anchor="middle">App server</text>
  <text x="390" y="445" class="block-sub" text-anchor="middle">private subnet</text>

  <rect x="700" y="384" width="220" height="76" rx="4" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-compute" x="712" y="400" width="22" height="22"/>
  <text x="810" y="412" class="block" text-anchor="middle">EC2 Instance B</text>
  <text x="810" y="430" class="block-sub" text-anchor="middle">App server</text>
  <text x="810" y="445" class="block-sub" text-anchor="middle">private subnet</text>

  <!-- ALB → EC2_A -->
  <line x1="600" y1="326" x2="600" y2="346" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 600 346 H 390 V 380" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="386,380 394,380 390,388" fill="#666"/>
  <!-- ALB → EC2_B -->
  <path d="M 600 346 H 810 V 380" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="806,380 814,380 810,388" fill="#666"/>

  <!-- ============================================================ -->
  <!-- BAND 3 — DATABASE LAYER (RDS)                                   -->
  <!-- ============================================================ -->
  <text x="80" y="520" class="eyebrow">DATABASE LAYER — RDS</text>

  <rect x="160" y="540" width="880" height="220" rx="6" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1"/>

  <!-- DB Subnet Group containing Primary + Standby -->
  <rect x="200" y="568" width="540" height="160" rx="4" fill="#fdfdfd" stroke="#d8d8d4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="220" y="586" class="sub-eyebrow">DB SUBNET GROUP</text>

  <rect x="230" y="600" width="220" height="110" rx="6" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1.4"/>
  <use href="#service-database" x="244" y="616" width="24" height="24"/>
  <text x="340" y="628" class="block" text-anchor="middle">RDS Primary</text>
  <text x="340" y="646" class="block-sub" text-anchor="middle">sa-east-1a</text>
  <text x="340" y="660" class="block-sub" text-anchor="middle">PostgreSQL</text>
  <text x="340" y="694" class="block-sub" text-anchor="middle" font-style="italic">read · write</text>

  <rect x="490" y="600" width="220" height="110" rx="6" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-database" x="504" y="616" width="24" height="24"/>
  <text x="600" y="628" class="block" text-anchor="middle">RDS Standby</text>
  <text x="600" y="646" class="block-sub" text-anchor="middle">sa-east-1b</text>
  <text x="600" y="660" class="block-sub" text-anchor="middle">Multi-AZ</text>
  <text x="600" y="694" class="block-sub" text-anchor="middle" font-style="italic">failover target</text>

  <!-- Read Replica outside the DB Subnet Group -->
  <rect x="780" y="600" width="220" height="110" rx="6" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-database" x="794" y="616" width="24" height="24"/>
  <text x="890" y="628" class="block" text-anchor="middle">Read Replica</text>
  <text x="890" y="646" class="block-sub" text-anchor="middle">sa-east-1c</text>
  <text x="890" y="660" class="block-sub" text-anchor="middle">read only</text>
  <text x="890" y="694" class="block-sub" text-anchor="middle" font-style="italic">reports · analytics</text>

  <!-- EC2_A → Primary (solid, write/read) -->
  <path d="M 390 460 V 510 H 320 V 600" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="316,600 324,600 320,608" fill="#666"/>
  <text x="252" y="504" class="edge-label">write · read</text>

  <!-- EC2_B → Primary (solid, write/read) -->
  <path d="M 810 460 V 530 H 360 V 600" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="356,600 364,600 360,608" fill="#666"/>
  <text x="690" y="524" class="edge-label">write · read</text>

  <!-- EC2_A → Read Replica (dashed, read only) -->
  <path d="M 390 460 V 490 H 920 V 600" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="916,600 924,600 920,608" fill="#666"/>
  <text x="694" y="484" class="edge-label">read only · reports</text>

  <!-- EC2_B → Read Replica (dashed, read only) -->
  <path d="M 810 460 V 490 H 880 V 600" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="876,600 884,600 880,608" fill="#666"/>
  <text x="816" y="484" class="edge-label">read only · analytics</text>

  <!-- Primary → Standby (dashed, synchronous replication) -->
  <line x1="450" y1="655" x2="486" y2="655" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 3"/>
  <polygon points="486,651 490,655 486,659" fill="#666"/>
  <text x="468" y="640" class="edge-label" text-anchor="middle">synchronous</text>
  <text x="468" y="676" class="edge-label" text-anchor="middle">replication</text>

  <!-- Primary → Read Replica (dashed, asynchronous, routes around DB Subnet Group) -->
  <path d="M 340 710 V 738 H 890 V 710" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="886,714 894,714 890,706" fill="#666"/>
  <text x="615" y="732" class="edge-label" text-anchor="middle">asynchronous replication</text>

  <!-- ============================================================ -->
  <!-- BAND 4 — BACKUPS & MONITORING                                   -->
  <!-- ============================================================ -->
  <text x="80" y="800" class="eyebrow">BACKUPS &amp; MONITORING</text>

  <!-- Auto Backups -->
  <rect x="200" y="820" width="240" height="100" rx="6" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-block-storage" x="214" y="836" width="22" height="22"/>
  <text x="320" y="848" class="block" text-anchor="middle">RDS Automated Backups</text>
  <text x="320" y="866" class="block-sub" text-anchor="middle">7 days retention</text>
  <text x="320" y="906" class="block-sub" text-anchor="middle" font-style="italic">point-in-time recovery</text>

  <!-- S3 Backups -->
  <rect x="480" y="820" width="240" height="100" rx="6" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <use href="#service-object-storage" x="494" y="836" width="22" height="22"/>
  <text x="600" y="848" class="block" text-anchor="middle">S3</text>
  <text x="600" y="866" class="block-sub" text-anchor="middle">Manual Snapshots</text>
  <text x="600" y="906" class="block-sub" text-anchor="middle" font-style="italic">long-term retention</text>

  <!-- CloudWatch -->
  <rect x="760" y="820" width="240" height="100" rx="6" fill="#ddd9ee" stroke="#b8a8d8" stroke-width="1"/>
  <use href="#service-metrics" x="774" y="836" width="22" height="22"/>
  <text x="880" y="848" class="block" text-anchor="middle">CloudWatch</text>
  <text x="880" y="866" class="block-sub" text-anchor="middle">Metrics &amp; Alarms</text>
  <text x="880" y="906" class="block-sub" text-anchor="middle" font-style="italic">observability</text>

  <!-- Primary → Auto Backups (dashed, automated snapshots) -->
  <path d="M 290 710 V 770 H 320 V 820" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="316,820 324,820 320,828" fill="#666"/>
  <text x="298" y="784" class="edge-label">automated snapshots</text>

  <!-- Primary → S3 Backups (dashed, manual snapshots) -->
  <path d="M 380 710 V 790 H 600 V 820" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="596,820 604,820 600,828" fill="#666"/>
  <text x="446" y="804" class="edge-label">manual snapshots</text>

  <!-- Primary → CloudWatch (dashed, metrics/logs) -->
  <path d="M 420 710 V 770 H 840 V 820" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="836,820 844,820 840,828" fill="#666"/>
  <text x="424" y="752" class="edge-label">metrics · logs</text>

  <!-- Replica → CloudWatch (dashed, metrics/logs) -->
  <path d="M 950 710 V 800 H 920 V 820" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" fill="none"/>
  <polygon points="916,820 924,820 920,828" fill="#666"/>
  <text x="954" y="752" class="edge-label">metrics · logs</text>

</svg>
