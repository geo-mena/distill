<!doctype html>
<html><head><meta charset="utf-8"><title>Components · HMM state</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">HMM states — italic symbol with upright subscript, large grey circles.</div>
  <div class="row gap-8" style="align-items:center;justify-content:space-around;">

    <div class="col gap-2" style="align-items:center;">
      <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="25" fill="#d3d3d3" stroke="#000" stroke-width="1.5"/>
        <text x="40" y="40" font-family="var(--font-sans)" font-size="20" font-style="italic" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">a<tspan font-size="12" font-style="normal" dx="1" dy="6">t</tspan></text>
      </svg>
      <div class="label">aₜ · default</div>
      <div class="mono">fill #d3d3d3</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="25" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1.5"/>
        <text x="40" y="40" font-family="var(--font-sans)" font-size="20" font-style="italic" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">x<tspan font-size="12" font-style="normal" dx="1" dy="6">t</tspan></text>
      </svg>
      <div class="label">xₜ · highlight</div>
      <div class="mono">salmon override</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="25" fill="#d3d3d3" stroke="#000" stroke-width="1.5"/>
      </svg>
      <div class="label">unlabelled</div>
      <div class="mono">no symbol</div>
    </div>

  </div>
</div></body></html>
