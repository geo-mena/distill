<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Graph edge</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Edges between graph nodes — straight, curved, dashed; with optional arrowhead.</div>
  <div class="row gap-8" style="align-items:center;justify-content:space-around;">

    <div class="col gap-2" style="align-items:center;">
      <svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.4">
          <path d="M 10 30 L 150 30" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
        </g>
      </svg>
      <div class="label">straight</div>
      <div class="mono">opacity 0.4</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.85">
          <path d="M 10 30 Q 80 -10 150 30" fill="none" stroke="#c44a3f" stroke-width="2.5" stroke-linecap="round"/>
        </g>
      </svg>
      <div class="label">highlighted curve</div>
      <div class="mono">stroke 2.5 · op 0.85</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.4">
          <path d="M 10 30 L 142 30" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
          <polygon points="150,30 143,26.5 143,33.5" fill="#666"/>
        </g>
      </svg>
      <div class="label">dashed → arrow</div>
      <div class="mono">arrow=end</div>
    </div>

  </div>
</div></body></html>
