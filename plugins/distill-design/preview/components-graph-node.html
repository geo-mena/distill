<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Graph node</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Search-tree nodes — four states for beam, debate, and hypothesis trees.</div>
  <div class="row gap-8" style="align-items:center;justify-content:space-around;">

    <div class="col gap-2" style="align-items:center;">
      <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="14" fill="#a8c8e8" stroke="#356aa8" stroke-width="1.5"/>
        <text x="30" y="30" font-family="var(--font-sans)" font-size="16" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">a</text>
      </svg>
      <div class="label">active</div>
      <div class="mono">#a8c8e8 · #356aa8</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="14" fill="#fdfdfd" stroke="#666" stroke-width="1.5"/>
        <text x="30" y="30" font-family="var(--font-sans)" font-size="16" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">b</text>
      </svg>
      <div class="label">neutral</div>
      <div class="mono">#fdfdfd · #666</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="14" fill="#e8e8e4" stroke="#c4c4c0" stroke-width="1.5"/>
        <text x="30" y="30" font-family="var(--font-sans)" font-size="16" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">c</text>
      </svg>
      <div class="label">pruned</div>
      <div class="mono">#e8e8e4 · #c4c4c0</div>
    </div>

    <div class="col gap-2" style="align-items:center;">
      <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="14" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1.5"/>
        <text x="30" y="30" font-family="var(--font-sans)" font-size="16" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">d</text>
      </svg>
      <div class="label">highlight</div>
      <div class="mono">#fbd9d4 · #c44a3f</div>
    </div>

  </div>
</div></body></html>
