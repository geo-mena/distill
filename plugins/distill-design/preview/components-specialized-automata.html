<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Cellular automata</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Discrete dynamical systems — Game of Life generations sequenced left-to-right.</div>
  <div class="row gap-3" style="align-items:flex-start;">
    <div class="col gap-2">
      <div class="label">glider · 3 generations</div>
      <!-- 3 grids of 4x4 (cell=18), arrowGap=36 -->
      <!-- glider t=0: (1,2) (2,3) (3,1) (3,2) (3,3) - simplified glider in 4x4 -->
      <!-- glider t=1: shifted -->
      <!-- glider t=2: shifted again -->
      <svg width="364" height="76" viewBox="0 0 364 76" xmlns="http://www.w3.org/2000/svg">
        <!-- Generation 0 -->
        <g>
          <!-- row 0 -->
          <rect x="2"  y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="2"  width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <!-- row 1 -->
          <rect x="2"  y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="20" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <!-- row 2 -->
          <rect x="2"  y="38" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <!-- row 3 -->
          <rect x="2"  y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
        </g>
        <!-- arrow 0 -> 1 -->
        <line x1="80" y1="38" x2="102" y2="38" stroke="#000" stroke-width="1.5"/>
        <polygon points="102,34 110,38 102,42" fill="#000"/>

        <!-- Generation 1 -->
        <g transform="translate(108,0)">
          <rect x="2"  y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="2"  width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="20" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="20" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="38" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="38" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
        </g>
        <line x1="188" y1="38" x2="210" y2="38" stroke="#000" stroke-width="1.5"/>
        <polygon points="210,34 218,38 210,42" fill="#000"/>

        <!-- Generation 2 -->
        <g transform="translate(216,0)">
          <rect x="2"  y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="2"  width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="2"  width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="20" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="20" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="38" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="38" width="18" height="18" fill="#333"   stroke="#666" stroke-width="0.5"/>

          <rect x="2"  y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="20" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="38" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
          <rect x="56" y="56" width="18" height="18" fill="#fdfdfd" stroke="#666" stroke-width="0.5"/>
        </g>
      </svg>
      <div class="mono">cell = 18px · 4 × 4</div>
    </div>
  </div>
</div></body></html>
