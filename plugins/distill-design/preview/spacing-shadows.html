<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing · Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#fdfdfd;padding:8px 0;">
  <div class="row gap-6" style="align-items:center;justify-content:space-around;">
    <div class="col gap-3" style="align-items:center;">
      <div style="width:140px;height:80px;background:#fdfdfd;border:1px solid #e8e8e4;border-radius:6px;"></div>
      <div class="col" style="align-items:center;"><div class="label">none</div><div class="mono" style="font-size:11px;">default</div></div>
    </div>
    <div class="col gap-3" style="align-items:center;">
      <div style="width:140px;height:80px;background:#fdfdfd;border-radius:6px;box-shadow:0 1px 2px rgba(20,20,20,0.04);"></div>
      <div class="col" style="align-items:center;"><div class="label">sm</div><div class="mono" style="font-size:11px;">subtle lift</div></div>
    </div>
    <div class="col gap-3" style="align-items:center;">
      <div style="width:140px;height:80px;background:#fdfdfd;border-radius:6px;box-shadow:0 2px 8px rgba(20,20,20,0.06);"></div>
      <div class="col" style="align-items:center;"><div class="label">md</div><div class="mono" style="font-size:11px;">popovers</div></div>
    </div>
    <div class="col gap-3" style="align-items:center;">
      <div style="width:140px;height:80px;background:#fdfdfd;border-radius:6px;box-shadow:0 4px 16px rgba(20,20,20,0.08);"></div>
      <div class="col" style="align-items:center;"><div class="label">pop</div><div class="mono" style="font-size:11px;">modals</div></div>
    </div>
  </div>
</div></body></html>
