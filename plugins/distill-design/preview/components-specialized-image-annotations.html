<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Image with annotations</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Annotation overlays — circle a region, label it in the matching accent color.</div>
  <div class="row gap-3" style="align-items:flex-start;">
    <div class="col gap-2">
      <div class="label">3 regions of interest</div>
      <svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
        <!-- placeholder image -->
        <rect width="400" height="250" fill="#e8e8e4"/>
        <!-- subtle internal texture so the gray rect reads as image surrogate -->
        <rect x="40"  y="40"  width="80" height="50" fill="#d8d8d4"/>
        <rect x="180" y="100" width="60" height="60" fill="#d8d8d4"/>
        <rect x="280" y="170" width="70" height="40" fill="#d8d8d4"/>
        <!-- annotation overlays -->
        <g>
          <!-- olive: top-left feature -->
          <circle cx="80" cy="65" r="22" fill="none" stroke="#8a8233" stroke-width="2"/>
          <text x="110" y="69" font-family="var(--font-sans)" font-size="13" fill="#8a8233">edge cluster</text>
          <!-- burgundy: center feature -->
          <circle cx="210" cy="130" r="22" fill="none" stroke="#8c3a4a" stroke-width="2"/>
          <text x="240" y="134" font-family="var(--font-sans)" font-size="13" fill="#8c3a4a">activation peak</text>
          <!-- slate: bottom-right feature -->
          <circle cx="315" cy="190" r="22" fill="none" stroke="#4f6470" stroke-width="2"/>
          <text x="345" y="194" font-family="var(--font-sans)" font-size="13" fill="#4f6470">trail</text>
        </g>
      </svg>
      <div class="mono">olive · burgundy · slate</div>
    </div>
  </div>
</div></body></html>
