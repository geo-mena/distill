<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Feynman diagram</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Particle interactions in QED — fermion lines, photon waves, vertex dots.</div>
  <div class="row gap-8" style="align-items:flex-start;">

    <!-- e+e- -> q qbar via photon exchange -->
    <div class="col gap-2">
      <div class="label">e⁺e⁻ → qq̄</div>
      <svg width="220" height="180" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">
        <!-- left vertex (50,90), right vertex (170,90) -->
        <!-- e- in (top-left to v1), e+ in (bottom-left to v1) -->
        <line x1="20"  y1="30"  x2="50" y2="90" stroke="#333" stroke-width="1.5"/>
        <polygon points="38.5,55 33,67 30,52" fill="#333"/>
        <line x1="20"  y1="150" x2="50" y2="90" stroke="#333" stroke-width="1.5"/>
        <polygon points="33,113 30,128 38.5,125" fill="#333"/>
        <!-- q out (v2 to top-right), qbar out (v2 to bottom-right) -->
        <line x1="170" y1="90"  x2="200" y2="30"  stroke="#333" stroke-width="1.5"/>
        <polygon points="186.5,55 195,52 192,67" fill="#333"/>
        <line x1="170" y1="90"  x2="200" y2="150" stroke="#333" stroke-width="1.5"/>
        <polygon points="186.5,125 192,113 195,128" fill="#333"/>
        <!-- photon between v1 and v2: hand-authored sinusoidal path -->
        <path d="M 50 90
                 Q 60 80 70 90
                 Q 80 100 90 90
                 Q 100 80 110 90
                 Q 120 100 130 90
                 Q 140 80 150 90
                 Q 160 100 170 90"
              fill="none" stroke="#3a7fbd" stroke-width="1.5"/>
        <!-- vertex dots -->
        <circle cx="50"  cy="90" r="2" fill="#000"/>
        <circle cx="170" cy="90" r="2" fill="#000"/>
        <!-- external labels -->
        <text x="14" y="26"  font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a" text-anchor="end">e⁻</text>
        <text x="14" y="156" font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a" text-anchor="end">e⁺</text>
        <text x="206" y="26"  font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a">q</text>
        <text x="206" y="156" font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a">q̄</text>
        <!-- photon label -->
        <text x="110" y="76" font-family="var(--font-sans)" font-size="13" font-style="italic" fill="#3a7fbd" text-anchor="middle">γ</text>
      </svg>
      <div class="mono">s-channel · γ exchange</div>
    </div>

    <!-- electron self-energy: photon loop -->
    <div class="col gap-2">
      <div class="label">electron self-energy</div>
      <svg width="220" height="180" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">
        <!-- straight fermion line left -> v1 -> v2 -> right (y=110) -->
        <line x1="20"  y1="110" x2="70"  y2="110" stroke="#333" stroke-width="1.5"/>
        <polygon points="50,106 58,110 50,114" fill="#333"/>
        <line x1="70"  y1="110" x2="150" y2="110" stroke="#333" stroke-width="1.5"/>
        <polygon points="106,106 114,110 106,114" fill="#333"/>
        <line x1="150" y1="110" x2="200" y2="110" stroke="#333" stroke-width="1.5"/>
        <polygon points="180,106 188,110 180,114" fill="#333"/>
        <!-- photon arc loop above between v1 (70,110) and v2 (150,110), opening upward -->
        <!-- semicircle radius 40 centered at (110,110) -->
        <path d="M 70 110
                 Q 75 90 80 90
                 Q 85 90 90 80
                 Q 95 70 100 80
                 Q 105 90 110 80
                 Q 115 70 120 80
                 Q 125 90 130 80
                 Q 135 70 140 90
                 Q 145 90 150 110"
              fill="none" stroke="#3a7fbd" stroke-width="1.5"/>
        <!-- vertices -->
        <circle cx="70"  cy="110" r="2" fill="#000"/>
        <circle cx="150" cy="110" r="2" fill="#000"/>
        <!-- labels -->
        <text x="14" y="114" font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a" text-anchor="end">e⁻</text>
        <text x="206" y="114" font-family="var(--font-sans)" font-size="14" font-style="italic" fill="#2a2a2a">e⁻</text>
        <text x="110" y="60" font-family="var(--font-sans)" font-size="13" font-style="italic" fill="#3a7fbd" text-anchor="middle">γ</text>
      </svg>
      <div class="mono">one-loop · QED</div>
    </div>

  </div>
</div></body></html>
