<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Debate tree</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Debate tree — claims (orange) vs counters (blue), one bold path follows the focus.</div>
  <div class="row" style="justify-content:center;">

    <svg width="640" height="280" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg">
      <!-- Root pill -->
      <g>
        <rect x="262" y="20" width="116" height="32" rx="10" ry="10" fill="#fdfdfd" stroke="#2a2a2a" stroke-width="2"/>
        <text x="320" y="36" font-family="var(--font-sans)" font-size="14" font-weight="600" fill="#2a2a2a" text-anchor="middle" dominant-baseline="central">root claim</text>
      </g>

      <!-- Level-1 edges from root (y=52) -->
      <g opacity="0.85"><path d="M 320 52 L 160 130" fill="none" stroke="#ee4900" stroke-width="2.5" stroke-linecap="round"/></g>
      <g opacity="0.4"><path d="M 320 52 L 320 130" fill="none" stroke="#008bee" stroke-width="1.5" stroke-linecap="round"/></g>
      <g opacity="0.4"><path d="M 320 52 L 480 130" fill="none" stroke="#ee4900" stroke-width="1.5" stroke-linecap="round"/></g>

      <!-- Level-1: bold pill (left, claim), dot (center, counter), dot (right, claim) -->
      <g>
        <rect x="100" y="114" width="120" height="32" rx="10" ry="10" fill="#fdfdfd" stroke="#ee4900" stroke-width="2"/>
        <text x="160" y="130" font-family="var(--font-sans)" font-size="13" font-weight="700" fill="#ee4900" text-anchor="middle" dominant-baseline="central">supports A</text>
      </g>
      <g>
        <circle cx="320" cy="130" r="2.5" fill="#008bee"/>
        <text x="328" y="130" font-family="var(--font-sans)" font-size="12" fill="#008bee" dominant-baseline="central">objects on B</text>
      </g>
      <g>
        <circle cx="480" cy="130" r="2.5" fill="#ee4900"/>
        <text x="488" y="130" font-family="var(--font-sans)" font-size="12" fill="#ee4900" dominant-baseline="central">supports C</text>
      </g>

      <!-- Level-2 edges from bold pill at (160,146) -->
      <g opacity="0.85"><path d="M 160 146 L 100 220" fill="none" stroke="#008bee" stroke-width="2.5" stroke-linecap="round"/></g>
      <g opacity="0.4"><path d="M 160 146 L 220 220" fill="none" stroke="#008bee" stroke-width="1.5" stroke-linecap="round"/></g>

      <!-- Level-2: bold counter (left), dot counter (right) -->
      <g>
        <rect x="40" y="204" width="120" height="32" rx="10" ry="10" fill="#fdfdfd" stroke="#008bee" stroke-width="2"/>
        <text x="100" y="220" font-family="var(--font-sans)" font-size="13" font-weight="700" fill="#008bee" text-anchor="middle" dominant-baseline="central">rebuts A·1</text>
      </g>
      <g>
        <circle cx="220" cy="220" r="2.5" fill="#008bee"/>
        <text x="228" y="220" font-family="var(--font-sans)" font-size="12" fill="#008bee" dominant-baseline="central">rebuts A·2</text>
      </g>
    </svg>

  </div>
  <div class="row gap-6" style="justify-content:center;margin-top:8px;">
    <div class="label">claim #ee4900 · counter #008bee</div>
  </div>
</div></body></html>
