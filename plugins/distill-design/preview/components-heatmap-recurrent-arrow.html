<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Recurrent arrow</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:var(--font-sans);font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Curved feedback arcs — the visual signature of recurrence.</div>
  <div class="row gap-8" style="align-items:flex-end;">

    <!-- lavender recurrence (default) -->
    <div class="col gap-2" style="align-items:center;">
      <svg width="160" height="80" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
        <!-- two cell anchors -->
        <rect x="14"  y="48" width="20" height="24" fill="#b8a8d8" stroke="#4f3d80" stroke-width="1"/>
        <rect x="126" y="48" width="20" height="24" fill="#b8a8d8" stroke="#4f3d80" stroke-width="1"/>
        <!-- arc above -->
        <path d="M 24 48 Q 80 8 136 48" fill="none" stroke="#8359b2" stroke-width="1.5"/>
        <polygon points="128,44 136,48 128,52" fill="#8359b2"/>
      </svg>
      <div class="label">LSTM recurrence</div>
      <div class="mono">lavender · above</div>
    </div>

    <!-- grey self-loop -->
    <div class="col gap-2" style="align-items:center;">
      <svg width="120" height="100" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="50"  y="64" width="20" height="24" fill="#fdfdfd" stroke="#333" stroke-width="1.2"/>
        <!-- tight self-loop arcing up and back -->
        <path d="M 56 64 Q 30 12 60 12" fill="none" stroke="#6a6a6a" stroke-width="1.5"/>
        <path d="M 60 12 Q 90 12 64 64" fill="none" stroke="#6a6a6a" stroke-width="1.5"/>
        <polygon points="60,60 64,68 68,60" fill="#6a6a6a"/>
      </svg>
      <div class="label">self-loop</div>
      <div class="mono">grey · tight arc</div>
    </div>

    <!-- salmon attention-style feedback -->
    <div class="col gap-2" style="align-items:center;">
      <svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="14"  y="48" width="20" height="24" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
        <rect x="166" y="48" width="20" height="24" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
        <!-- below arc, salmon -->
        <path d="M 24 72 Q 100 116 176 72" fill="none" stroke="#c44a3f" stroke-width="1.5"/>
        <polygon points="168,68 176,72 168,76" fill="#c44a3f"/>
      </svg>
      <div class="label">attention feedback</div>
      <div class="mono">salmon · below</div>
    </div>

  </div>
</div></body></html>
