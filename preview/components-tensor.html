<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Tensor cells</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font-family:'Crimson Text',serif;font-size:14px;color:#6a6a6a;font-style:italic;margin-bottom:14px;">Vectors-as-rectangles — the soul of every Distill diagram.</div>
  <div class="row gap-8" style="align-items:center;">
    <!-- salmon column (input) -->
    <svg width="32" height="160" viewBox="0 0 32 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2"  width="28" height="30" fill="#f8c2bb" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="34" width="28" height="30" fill="#f5a39b" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="66" width="28" height="30" fill="#f8c2bb" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="98" width="28" height="30" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="130" width="28" height="28" fill="#f5a39b" stroke="#c44a3f" stroke-width="1"/>
    </svg>
    <div class="col gap-1"><div class="label">input</div><div class="mono">salmon</div></div>

    <!-- blue column (conditioning) -->
    <svg width="32" height="160" viewBox="0 0 32 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2"   width="28" height="30" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="34"  width="28" height="30" fill="#bdd2ec" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="66"  width="28" height="30" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="98"  width="28" height="30" fill="#d6e4f3" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="130" width="28" height="28" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
    </svg>
    <div class="col gap-1"><div class="label">conditioning</div><div class="mono">powder blue</div></div>

    <!-- mixed column -->
    <svg width="32" height="160" viewBox="0 0 32 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2"   width="28" height="30" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="34"  width="28" height="30" fill="#a8c8e8" stroke="#356aa8" stroke-width="1"/>
      <rect x="2" y="66"  width="28" height="30" fill="#f5a39b" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="98"  width="28" height="30" fill="#f8c2bb" stroke="#c44a3f" stroke-width="1"/>
      <rect x="2" y="130" width="28" height="28" fill="#f5a39b" stroke="#c44a3f" stroke-width="1"/>
    </svg>
    <div class="col gap-1"><div class="label">concatenated</div><div class="mono">mixed</div></div>
  </div>
</div></body></html>
