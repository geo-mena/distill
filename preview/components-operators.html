<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Diagram operators</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row gap-8" style="align-items:center;justify-content:space-around;">
    <div class="col gap-2" style="align-items:center;">
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="#fdfdfd" stroke="#333" stroke-width="1.5"/><line x1="20" y1="10" x2="20" y2="30" stroke="#333" stroke-width="1.5"/><line x1="10" y1="20" x2="30" y2="20" stroke="#333" stroke-width="1.5"/></svg>
      <div class="label">⊕ add</div>
    </div>
    <div class="col gap-2" style="align-items:center;">
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="#fdfdfd" stroke="#333" stroke-width="1.5"/><circle cx="20" cy="20" r="2.5" fill="#333"/></svg>
      <div class="label">⊙ mul</div>
    </div>
    <div class="col gap-2" style="align-items:center;">
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="#fdfdfd" stroke="#333" stroke-width="1.5"/><line x1="13" y1="13" x2="27" y2="27" stroke="#333" stroke-width="1.5"/><line x1="27" y1="13" x2="13" y2="27" stroke="#333" stroke-width="1.5"/></svg>
      <div class="label">⊗ outer</div>
    </div>
    <div class="col gap-2" style="align-items:center;">
      <svg width="80" height="40" viewBox="0 0 80 40"><line x1="6" y1="20" x2="68" y2="20" stroke="#555" stroke-width="1.5"/><polygon points="68,15 76,20 68,25" fill="#555"/></svg>
      <div class="label">→ flow</div>
    </div>
    <div class="col gap-2" style="align-items:center;">
      <svg width="80" height="40" viewBox="0 0 80 40"><line x1="6" y1="20" x2="68" y2="20" stroke="#888" stroke-width="1.5" stroke-dasharray="3 3"/><polygon points="68,15 76,20 68,25" fill="#888"/></svg>
      <div class="label">⇢ optional</div>
    </div>
  </div>
</div></body></html>
