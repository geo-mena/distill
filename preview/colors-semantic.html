<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Semantic & accent</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:12px;">
    <div style="flex:1;">
      <div style="background:#f5b942;height:64px;border-radius:4px;display:flex;align-items:flex-end;padding:8px;"><div><div class="label">highlight</div><div class="mono">#f5b942</div></div></div>
      <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-muted);margin-top:6px;font-style:italic;">Pointer-finger affordance</div>
    </div>
    <div style="flex:1;">
      <div style="background:#fce4b3;height:64px;border-radius:4px;display:flex;align-items:flex-end;padding:8px;"><div><div class="label">highlight-soft</div><div class="mono">#fce4b3</div></div></div>
      <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-muted);margin-top:6px;font-style:italic;">Hover background</div>
    </div>
  </div>
  <div class="row" style="gap:12px;margin-top:14px;">
    <div style="flex:1;">
      <div style="background:#c44a3f;height:64px;border-radius:4px;display:flex;align-items:flex-end;padding:8px;"><div style="color:#fff;"><div class="label" style="color:#fff;opacity:.85;">link</div><div class="mono" style="color:#fff;opacity:.9;">#c44a3f</div></div></div>
      <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-muted);margin-top:6px;font-style:italic;">Body-prose link color</div>
    </div>
    <div style="flex:1;">
      <div style="background:#a8c8e8;height:64px;border-radius:4px;display:flex;align-items:flex-end;padding:8px;"><div><div class="label">focus-ring</div><div class="mono">#a8c8e8</div></div></div>
      <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-muted);margin-top:6px;font-style:italic;">Keyboard focus outline</div>
    </div>
  </div>
</div></body></html>
