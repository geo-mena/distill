<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="col gap-4">
    <div class="row gap-3" style="align-items:center;">
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#fdfdfd;background:#2a2a2a;border:1px solid #2a2a2a;border-radius:4px;padding:8px 14px;cursor:pointer;">Read article</button>
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#2a2a2a;background:#fdfdfd;border:1px solid #d8d8d4;border-radius:4px;padding:8px 14px;cursor:pointer;">Cite</button>
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#2a2a2a;background:transparent;border:1px solid transparent;border-radius:4px;padding:8px 14px;cursor:pointer;">Share</button>
      <span class="mono">default</span>
    </div>
    <div class="row gap-3" style="align-items:center;">
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#fdfdfd;background:#4a4a4a;border:1px solid #4a4a4a;border-radius:4px;padding:8px 14px;cursor:pointer;">Read article</button>
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#2a2a2a;background:#faf9f6;border:1px solid #c4c4c0;border-radius:4px;padding:8px 14px;cursor:pointer;">Cite</button>
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#2a2a2a;background:#faf9f6;border:1px solid #e8e8e4;border-radius:4px;padding:8px 14px;cursor:pointer;">Share</button>
      <span class="mono">hover</span>
    </div>
    <div class="row gap-3" style="align-items:center;">
      <button style="font-family:'Libre Franklin';font-size:14px;font-weight:500;color:#fdfdfd;background:#2a2a2a;border:1px solid #2a2a2a;border-radius:4px;padding:8px 14px;cursor:pointer;outline:2px solid #a8c8e8;outline-offset:2px;">Read article</button>
      <span class="mono">focus · 2px ring · powder-blue 300</span>
    </div>
  </div>
</div></body></html>
