<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="col gap-4">
    <div class="col gap-2">
      <input type="text" placeholder="Search articles…" style="font-family:'Libre Franklin';font-size:14px;color:#2a2a2a;background:#fdfdfd;border:1px solid #d8d8d4;border-radius:4px;padding:9px 12px;width:340px;">
      <span class="mono">default</span>
    </div>
    <div class="col gap-2">
      <input type="text" value="conditional bias" style="font-family:'Libre Franklin';font-size:14px;color:#2a2a2a;background:#fdfdfd;border:1px solid #7eaadb;border-radius:4px;padding:9px 12px;width:340px;outline:none;box-shadow:0 0 0 3px #d6e4f3;">
      <span class="mono">focus · powder-blue ring</span>
    </div>
    <div class="col gap-2">
      <textarea rows="3" placeholder="Caption…" style="font-family:'Crimson Text',serif;font-size:14px;line-height:1.5;color:#2a2a2a;background:#fdfdfd;border:1px solid #d8d8d4;border-radius:4px;padding:9px 12px;width:440px;resize:none;"></textarea>
      <span class="mono">textarea · serif body</span>
    </div>
  </div>
</div></body></html>
