<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Distill Design System</title>
  <desc>A Claude Skill that codifies Distill's editorial and diagrammatic conventions. The cover mirrors a Distill article hero: DISTILL eyebrow, "Design System" title, italic subtitle, and a three-column byline grid for SCOPE, VALIDATED, OUTPUT. On the right, a fan-out diagram in the style of FiLM article figures: a salmon input vector flows into a vertical-rl design-system block, then forks into three labeled artifact blocks (Article, Diagram, Slides). An orange pointer glyph anchors the right edge.</desc>
  <style>
    text {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", Arial, sans-serif;
      text-rendering: geometricPrecision;
    }
    .eyebrow      { font-size: 12px; font-weight: 500; letter-spacing: 1.44px; fill: #6a6a6a; }
    .h1           { font-size: 56px; font-weight: 700; letter-spacing: -0.84px; fill: #000; }
    .sub          { font-size: 22px; font-style: italic; fill: #4a4a4a; }
    .meta-label   { font-size: 10px; font-weight: 500; letter-spacing: 1px; fill: #6a6a6a; }
    .meta-value   { font-size: 14px; fill: #2a2a2a; }
    .meta-aff     { font-size: 13px; font-style: italic; fill: #6a6a6a; }
    .stack-label  { font-size: 13px; fill: #4a4a4a; }
    .vlabel       { font-size: 13px; font-weight: 500; fill: #2a2a2a; }
    .out-label    { font-size: 14px; font-weight: 500; fill: #2a2a2a; }
  </style>

  <rect width="1600" height="500" fill="#fdfdfd"/>

  <!-- ─── LEFT: editorial header (article-hero pattern) ─── -->
  <text x="96" y="140" class="eyebrow">CLAUDE SKILL · DISTILL</text>
  <text x="96" y="200" class="h1">Design System</text>
  <text x="96" y="255" class="sub">Editorial and diagrammatic conventions of distill.pub, codified for Claude.</text>

  <line x1="96" y1="296" x2="960" y2="296" stroke="#e8e8e4" stroke-width="1"/>

  <!-- 3-col byline grid (mirrors ArticleHeader from ui_kits/article/Chrome.tsx) -->
  <text x="96"  y="320" class="meta-label">SCOPE</text>
  <text x="96"  y="346" class="meta-value">Voice, color, type, diagrams</text>
  <text x="96"  y="367" class="meta-aff">distill.pub · 2017–2021</text>

  <text x="384" y="320" class="meta-label">VALIDATED</text>
  <text x="384" y="346" class="meta-value">10-article DOM audit</text>
  <text x="384" y="367" class="meta-aff">live distill.pub, 131 figures</text>

  <text x="672" y="320" class="meta-label">OUTPUT</text>
  <text x="672" y="346" class="meta-value">HTML, TSX, hybrid</text>
  <text x="672" y="367" class="meta-aff">articles, diagrams, slides</text>

  <!-- ─── RIGHT: fan-out diagram, FiLM-network style ─── -->

  <!-- "prompt" caption -->
  <text x="1070" y="160" class="stack-label" text-anchor="middle">prompt</text>

  <!-- input: salmon TensorVector, 4 cells, alternating shades -->
  <rect x="1056" y="178" width="28" height="28" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <rect x="1056" y="208" width="28" height="28" fill="#f8c2bb" stroke="#c44a3f" stroke-width="1"/>
  <rect x="1056" y="238" width="28" height="28" fill="#f5a39b" stroke="#c44a3f" stroke-width="1"/>
  <rect x="1056" y="268" width="28" height="28" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1"/>

  <!-- arrow input → design system -->
  <line x1="1098" y1="240" x2="1158" y2="240" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="1158,236 1166,240 1158,244" fill="#666"/>

  <!-- design system block: salmon-strong fill, vertical-rl label -->
  <rect x="1170" y="170" width="70" height="160" rx="4" fill="#fbd9d4" stroke="#c44a3f" stroke-width="1.2"/>
  <text x="1205" y="250" class="vlabel" text-anchor="middle" transform="rotate(-90 1205 250)">design system</text>

  <!-- fork: stem from block to forking point -->
  <line x1="1240" y1="240" x2="1280" y2="240" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  <!-- top branch: bent path stem→top -->
  <path d="M 1280 240 V 175 H 1322" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="1322,171 1330,175 1322,179" fill="#666"/>

  <!-- mid branch: straight -->
  <line x1="1280" y1="240" x2="1322" y2="240" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="1322,236 1330,240 1322,244" fill="#666"/>

  <!-- bottom branch: bent path stem→bottom -->
  <path d="M 1280 240 V 305 H 1322" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="1322,301 1330,305 1322,309" fill="#666"/>

  <!-- output block: Article (top) -->
  <rect x="1334" y="155" width="120" height="40" rx="4" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <text x="1394" y="180" class="out-label" text-anchor="middle">Article</text>

  <!-- output block: Diagram (mid) -->
  <rect x="1334" y="220" width="120" height="40" rx="4" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <text x="1394" y="245" class="out-label" text-anchor="middle">Diagram</text>

  <!-- output block: Slides (bottom) -->
  <rect x="1334" y="285" width="120" height="40" rx="4" fill="#fdecea" stroke="#c44a3f" stroke-width="1"/>
  <text x="1394" y="310" class="out-label" text-anchor="middle">Slides</text>

  <!-- "n outputs" mini-label -->
  <text x="1394" y="350" class="stack-label" text-anchor="middle">n artifacts</text>

  <!-- PointerGlyph: orange end-stop, anchored to mid output -->
  <g transform="translate(1474 230) scale(0.833)">
    <circle cx="12" cy="12" r="11" fill="#f5b942"/>
    <path d="M10.5 7.4c0-.55.45-1 1-1s1 .45 1 1v3.4h.55V7.0c0-.55.45-1 1-1s1 .45 1 1v3.8h.55V7.7c0-.55.45-1 1-1s1 .45 1 1v3.6h.4c.55 0 1 .45 1 1v3c0 1.93-1.57 3.5-3.5 3.5h-2.6c-.95 0-1.85-.38-2.52-1.05l-2.7-2.7c-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0l1.4 1.4V7.4z" fill="#fff"/>
  </g>
</svg>
