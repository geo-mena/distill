  <title>FiLM: A General-Purpose Conditioning Layer · Distill</title>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Diagrams.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const BIB = {
      1: { authors: "Perez et al.", title: "FiLM: Visual Reasoning with a General Conditioning Layer", venue: "AAAI 2018" },
      2: { authors: "Perez et al.", title: "Learning Visual Reasoning Without Strong Priors", venue: "ICML Workshop 2017" },
      3: { authors: "Dumoulin et al.", title: "A Learned Representation for Artistic Style", venue: "ICLR 2017" },
      4: { authors: "Ghiasi et al.", title: "Exploring the structure of a real-time, arbitrary neural artistic stylization network", venue: "BMVC 2017" },
    };

    const TOC = [
      { id: "intro", label: "Introduction", depth: 1 },
      { id: "feature-wise", label: "Feature-wise transformations", depth: 1 },
      { id: "concat", label: "Concatenation-based conditioning", depth: 2 },
      { id: "biasing", label: "Conditional biasing", depth: 2 },
      { id: "scaling", label: "Conditional scaling", depth: 2 },
      { id: "film", label: "FiLM", depth: 1 },
      { id: "play", label: "An interactive view of γ and β", depth: 2 },
      { id: "applications", label: "Applications", depth: 1 },
      { id: "references", label: "References", depth: 1 },
    ];

    function Article() {
      const [tocOpen, setTocOpen] = useState(false);
      return (
        <>
          <ArticleNav onOpenTOC={() => setTocOpen(true)} />
          <TOCDrawer open={tocOpen} onClose={() => setTocOpen(false)} items={TOC} />
          <ArticleHeader
            title="Feature-wise transformations"
            subtitle="A simple and surprisingly effective family of conditioning mechanisms."
            authors="Vincent Dumoulin, Ethan Perez, Nathan Schucher"
            affiliation="Google Brain · MILA"
            date="July 9, 2018"
          />
          <main className="article-body">
            <h2 id="intro">Introduction</h2>
            <p>Many of the most interesting problems in machine learning involve some form of <em>conditioning</em>: rendering a scene in a given style, answering a question about an image, generating audio that matches a target speaker. In each case, a model's behaviour is meant to depend on some auxiliary input — a class label, an embedding, a piece of text. <strong>How that auxiliary input enters the network</strong> is, on its own, an interesting design question.<Citation refs={[1]} bib={BIB} /></p>
            <p>This article walks through a small family of conditioning mechanisms that turn out to be surprisingly closely related: concatenation, biasing, scaling, and finally <strong>FiLM</strong> — feature-wise linear modulation. Each is mathematically simple. Each can be derived from the others. And together they cover a remarkable amount of the conditioning literature.</p>

            <h2 id="feature-wise">Feature-wise transformations</h2>

            <h3 id="concat">Concatenation-based conditioning</h3>
            <p>The simplest thing one can do with a conditioning representation is to <em>append</em> it to the input. <strong>Concatenation-based conditioning</strong> simply concatenates the conditioning representation to the input. The result is passed through a linear layer to produce the output.</p>
            <Figure n={1} breakout caption={<>Concatenating the conditioning representation onto the input before a linear layer.</>}>
              <ConcatDiagram />
            </Figure>

            <h3 id="biasing">Conditional biasing</h3>
            <p><strong>Conditional biasing</strong> first maps the conditioning representation to a bias vector. The bias vector is then added to the input. This looks superficially different — and yet, the two are mathematically equivalent.</p>
            <Figure n={2} breakout caption={<>Conditional biasing: project the conditioning representation, then add it.</>}>
              <BiasDiagram />
            </Figure>
            <p>The intuition: when we feed <code>[x; z]</code> through a linear layer with weights <code>W</code>, we can decompose the matrix-vector product into two matrix-vector subproducts. The <em>z</em>-dependent vector is exactly a conditional bias.<Citation refs={[2, 1]} bib={BIB} /></p>
            <MathBlock eqRef="1">W [x; z] = W<sub>x</sub> x + W<sub>z</sub> z &nbsp; ⇒ &nbsp; output = Wx + (conditional bias)</MathBlock>

            <h3 id="scaling">Conditional scaling</h3>
            <p>If we can <em>add</em> a conditioning-dependent vector, we can also <em>multiply</em> by one. <strong>Conditional scaling</strong> first maps the conditioning representation to a scaling vector. The scaling vector is then multiplied with the input.</p>
            <Figure n={3} breakout caption={<>Conditional scaling: project, then multiply elementwise.</>}>
              <ScalingDiagram />
            </Figure>

            <h2 id="film">FiLM</h2>
            <p>Once we have biasing and scaling on the table, the next move is obvious: <em>do both</em>. A <strong>FiLM layer</strong> applies an affine transformation per feature, with the affine parameters γ and β predicted by a small <strong>FiLM generator</strong> from the conditioning representation.<Citation refs={[1]} bib={BIB} /></p>
            <Figure n={4} breakout caption={<>The FiLM generator processes the conditioning information and produces γ/β parameters that describe how the target network should alter its computation.</>}>
              <FiLMNetworkDiagram />
            </Figure>

            <h3 id="play">An interactive view of γ and β</h3>
            <p>It helps to play with the values directly. Below, the input vector is fixed; γ and β are sliders. Watch how a single γ/β pair shifts the activation distribution wholesale — <strong>this is the entire mechanism</strong>.</p>
            <Figure breakout caption={<>γ scales each feature; β shifts each feature. One pair of values modulates the whole vector.</>}>
              <FiLMScrubber />
            </Figure>

            <h2 id="applications">Applications</h2>
            <p>The visual reasoning model of Perez et al.<Citation refs={[1]} bib={BIB} /> uses FiLM to modulate a visual processing pipeline based on an input question. The artistic style transfer model of Ghiasi et al.<Citation refs={[4]} bib={BIB} /> uses FiLM to make instance-normalization parameters style-dependent. In both cases, the conditioning mechanism is the same handful of multiplies and adds — what changes is what generates γ and β.</p>
            <p>This is the satisfying part. The mechanism is small, the failure modes are interpretable, and the same primitive shows up across what at first look like unrelated problems.</p>

            <h2 id="references">References</h2>
            <ul className="bib">
              {Object.entries(BIB).map(([n, b]) => (
                <li key={n}><span className="num">[{n}]</span>{b.authors}. <em>{b.title}</em>. {b.venue}.</li>
              ))}
            </ul>
          </main>
          <ArticleFooter />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Article />);
  </script>
